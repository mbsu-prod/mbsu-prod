<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f5f7" id="meta-theme-color">
<title>MBSU Prod</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f2f2f7; --card:#fff; --card2:#f9f9fb;
  --bd:#e5e5ea; --bd2:#c7c7cc;
  --tx:#1c1c1e; --mu:#8e8e93; --mu2:#aeaeb2;
  --red:#ff3b30; --blue:#007aff; --green:#34c759; --amber:#ff9f0a;
  --red-d:rgba(255,59,48,.09); --blue-d:rgba(0,122,255,.1); --green-d:rgba(52,199,89,.1);
  --hdr-bg:rgba(255,255,255,.88);
  --shadow-1:0 1px 4px rgba(0,0,0,.06);
  --shadow-2:0 6px 24px rgba(0,0,0,.12);
  --shadow-card:0 1px 3px rgba(0,0,0,.04);
  --input-focus-bg:#fff;
}
[data-theme="dark"]{
  --bg:#000; --card:#1c1c1e; --card2:#2c2c2e;
  --bd:#38383a; --bd2:#48484a;
  --tx:#fff; --mu:#98989f; --mu2:#636366;
  --red:#ff453a; --blue:#0a84ff; --green:#30d158; --amber:#ff9f0a;
  --red-d:rgba(255,69,58,.18); --blue-d:rgba(10,132,255,.18); --green-d:rgba(48,209,88,.18);
  --hdr-bg:rgba(28,28,30,.85);
  --shadow-1:0 1px 4px rgba(0,0,0,.4);
  --shadow-2:0 6px 24px rgba(0,0,0,.5);
  --shadow-card:0 1px 3px rgba(0,0,0,.3);
  --input-focus-bg:#2c2c2e;
}
html,body{height:100%;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR','Segoe UI',sans-serif;
  font-size:14px;line-height:1.5;-webkit-tap-highlight-color:transparent;
  transition:background .25s ease, color .25s ease}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

/* ── THEME TOGGLE ───────────────────────── */
.theme-toggle{
  position:absolute;top:14px;left:16px;
  width:36px;height:36px;border-radius:50%;
  background:var(--bg);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:all .2s;
  box-shadow:var(--shadow-1)
}
.theme-toggle:hover{transform:scale(1.08);border-color:var(--bd2)}
.theme-toggle-inline{
  width:34px;height:34px;border-radius:50%;
  background:var(--bg);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all .15s;flex-shrink:0
}
.theme-toggle-inline:hover{border-color:var(--bd2)}

/* ── USER BAR (hidden when no auth) ─────── */
.user-bar{display:none}
/* ── PAGES ─────────────────────────────── */
.page{display:none;min-height:100vh;flex-direction:column;max-width:640px;margin:0 auto;width:100%}
.page.active{display:flex}
/* ── HOME ────────────────────────────────── */
.home-hero{
  padding:72px 28px 60px;background:var(--card);
  text-align:center;border-bottom:1px solid var(--bd);position:relative
}
.user-bar{position:absolute;top:14px;right:16px;display:flex;align-items:center;gap:8px}
.user-photo{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1.5px solid var(--bd)}
.signout-btn{font-size:11px;color:var(--mu);padding:4px 8px;border:1px solid var(--bd);border-radius:7px;background:var(--bg)}
.signout-btn:hover{color:var(--red);border-color:rgba(255,59,48,.3)}
.logo-hero{width:100px;height:100px;margin:0 auto 28px;display:block;border-radius:24px;box-shadow:var(--shadow-2)}
.home-title{font-size:36px;font-weight:800;letter-spacing:-.5px;color:var(--tx);margin-bottom:8px}
.home-sub{font-size:10px;letter-spacing:3px;color:var(--mu2);text-transform:uppercase}
.home-nav{padding:20px 16px 36px;background:var(--bg)}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.nav-card{
  background:var(--card);border:1px solid var(--bd);border-radius:16px;
  padding:20px 16px 18px;cursor:pointer;transition:all .18s;
  text-align:left;display:flex;flex-direction:column;
  box-shadow:var(--shadow-1)
}
.nav-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-2);border-color:var(--bd2)}
.nc-dot{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:14px;flex-shrink:0}
.nc-red .nc-dot{background:var(--red-d)}
.nc-green .nc-dot{background:var(--green-d)}
.nc-blue .nc-dot{background:var(--blue-d)}
.nc-amber .nc-dot{background:rgba(255,159,10,.1)}
.nc-title{font-size:13px;font-weight:700;color:var(--tx)}
.nc-desc{font-size:11px;color:var(--mu);margin-top:3px;flex:1}
.nc-link{font-size:11px;color:var(--mu2);margin-top:12px}
/* ── INNER HEADER ───────────────────────── */
.inner-hdr{
  background:var(--hdr-bg);border-bottom:1px solid var(--bd);
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:80;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)
}
.back-btn{color:var(--blue);font-size:13px;padding:4px 8px;border-radius:6px;display:flex;align-items:center;gap:4px;font-weight:600;transition:opacity .15s}
.back-btn:hover{opacity:.7}
.sep{color:var(--mu2);font-size:12px}
.inner-title{font-weight:700;font-size:15px;color:var(--tx)}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.add-btn{background:var(--tx);color:var(--bg);padding:7px 14px;border-radius:10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;transition:opacity .15s}
.add-btn:hover{opacity:.75}
/* ── SCHEDULE ───────────────────────────── */
.sched-body{padding:14px;flex:1;overflow-y:auto;background:var(--bg)}
.view-tabs{
  display:flex;gap:0;margin-bottom:12px;
  background:var(--card);border:1px solid var(--bd);border-radius:10px;
  padding:3px;box-shadow:var(--shadow-1)
}
.vtab{
  flex:1;padding:8px 10px;font-size:12px;font-weight:600;
  color:var(--mu);border-radius:7px;transition:all .18s
}
.vtab.active{background:var(--tx);color:var(--bg)}
.filter-row{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.fpill{padding:6px 14px;border-radius:20px;border:1px solid var(--bd);background:var(--card);color:var(--mu);font-size:11px;font-weight:500;transition:all .15s}
.fpill:hover{color:var(--tx);border-color:var(--bd2)}
.fpill.active{border-color:var(--red);background:var(--red-d);color:var(--red)}
/* Calendar */
.cal-card{background:var(--card);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow-1)}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--bd);gap:6px}
.cal-hdr-center{display:flex;align-items:center;gap:8px}
.cal-month{font-weight:700;font-size:14px;color:var(--tx)}
.cal-nav-btn{color:var(--mu2);font-size:18px;padding:4px 10px;border-radius:6px;transition:all .15s}
.cal-nav-btn:hover{background:var(--bg);color:var(--tx)}
.today-btn{
  font-size:10px;font-weight:700;color:var(--red);
  background:var(--red-d);border:1px solid rgba(255,59,48,.25);
  padding:3px 10px;border-radius:8px;transition:all .15s
}
.today-btn:hover{background:rgba(255,59,48,.18)}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--card2);border-bottom:1px solid var(--bd)}
.cal-dow{text-align:center;padding:7px 2px;font-size:10px;color:var(--mu2);font-weight:600}
.cal-dow:first-child{color:var(--red)}.cal-dow:last-child{color:var(--blue)}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{
  padding:6px 3px 4px;text-align:center;cursor:pointer;
  border-top:1px solid var(--bd);border-right:1px solid var(--bd);
  min-height:48px;transition:background .1s;position:relative
}
.cal-day:nth-child(7n){border-right:none}
.cal-day:hover{background:var(--card2)}
.cal-day.other-mo{opacity:.3;pointer-events:none}
.cal-day.today .dn{background:var(--red);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.cal-day.sel{background:var(--blue-d)}
.dn{font-size:11px;color:var(--tx);display:block;margin-bottom:2px;line-height:20px}
.cal-day:nth-child(7n+1) .dn{color:var(--red)}
.cal-day:nth-child(7n) .dn{color:var(--blue)}
.edots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;padding:0 2px}
.edot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
/* Event list */
.el-hdr{font-size:10px;color:var(--mu);letter-spacing:1px;text-transform:uppercase;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.ev-list{display:flex;flex-direction:column;gap:6px}
.ev-item{
  background:var(--card);border:1px solid var(--bd);border-radius:12px;
  padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:all .15s;box-shadow:var(--shadow-card)
}
.ev-item:hover{border-color:var(--bd2);box-shadow:var(--shadow-2)}
.ev-bar{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.ev-info{flex:1;min-width:0}
.ev-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx)}
.ev-meta{font-size:10px;color:var(--mu);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.ev-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;flex-shrink:0;white-space:nowrap}
.es-todo{background:rgba(142,142,147,.15);color:var(--mu)}
.es-prog{background:var(--blue-d);color:var(--blue)}
.es-done{background:var(--green-d);color:var(--green)}
/* ── EQUIPMENT ──────────────────────────── */
.eq-body{padding:0;flex:1;overflow-y:auto}
.eq-top{padding:14px 14px 0}
.eq-search-wrap{position:relative;margin-bottom:10px}
.eq-si-txt{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--mu);pointer-events:none}
.eq-inp{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:10px 12px 10px 36px;color:var(--tx);font-size:13px;transition:border-color .2s}
.eq-inp::placeholder{color:var(--mu2)}.eq-inp:focus{outline:none;border-color:var(--blue)}
.eq-filters{display:flex;gap:6px;padding:0 14px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.eq-filters::-webkit-scrollbar{display:none}
.eq-fb{padding:7px 14px;border-radius:20px;border:1px solid var(--bd);color:var(--mu);font-size:11px;font-weight:500;white-space:nowrap;flex-shrink:0;transition:all .15s;background:var(--card)}
.eq-fb:hover{color:var(--tx);border-color:var(--bd2)}.eq-fb.active{border-color:var(--green);background:var(--green-d);color:var(--green);font-weight:700}
.eq-cat-block{margin-bottom:0}
.eq-cat-hdr{display:flex;align-items:center;gap:10px;padding:9px 16px 8px;background:var(--card2);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10}
.eq-cat-ico{font-size:17px;line-height:1;width:22px;text-align:center}
.eq-cat-name{font-size:11px;font-weight:700;color:var(--tx);letter-spacing:.3px;flex:1}
.eq-cat-cnt{font-size:10px;font-weight:600;padding:2px 9px;border-radius:10px;white-space:nowrap;background:var(--bd);color:var(--mu)}
.eq-list{display:flex;flex-direction:column}
.eq-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .12s;position:relative;background:var(--card)}
.eq-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rclr,transparent)}
.eq-row:hover{background:var(--card2)}
.eq-row:last-child{border-bottom:none}
.eq-ico-wrap{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.eq-row-body{flex:1;min-width:0}
.eq-row-name{font-size:13px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eq-row-sub{font-size:10px;color:var(--mu);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.eq-owner-tag{background:var(--bd);color:var(--mu);font-size:9px;font-weight:600;padding:1px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.eq-row-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.eq-qty-badge{font-size:11px;font-weight:700;color:var(--tx);background:var(--bg);border:1px solid var(--bd);padding:2px 9px;border-radius:7px;white-space:nowrap}
/* ── FILMOGRAPHY ────────────────────────── */
.filmo-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--bd);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.filmo-tabs::-webkit-scrollbar{display:none}
.filmo-tab{padding:12px 20px;font-size:13px;font-weight:600;color:var(--mu);white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;flex-shrink:0}
.filmo-tab.active{color:var(--tx);border-bottom-color:var(--tx)}
.filmo-item{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px 14px 12px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-card);margin-bottom:8px}
.filmo-item:hover{border-color:var(--bd2);box-shadow:var(--shadow-2)}
.filmo-year-badge{display:inline-block;font-size:10px;font-weight:700;background:var(--bg);border:1px solid var(--bd);color:var(--mu);padding:2px 8px;border-radius:6px;margin-bottom:8px}
.filmo-title{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:4px}
.filmo-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filmo-type-badge{font-size:10px;font-weight:600;background:var(--bg);border:1px solid var(--bd);color:var(--mu);padding:2px 8px;border-radius:6px}
.filmo-role{font-size:12px;color:var(--mu)}
.filmo-notes{font-size:11px;color:var(--mu2);margin-top:6px}
/* ── MISC ───────────────────────────────── */
.list-body{padding:14px;flex:1;overflow-y:auto;background:var(--bg)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:22px 22px 0 0;padding:22px 20px 32px;width:100%;max-width:480px;animation:slideUp .22s ease;max-height:92vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-weight:700;font-size:16px;color:var(--tx)}
.modal-x{color:var(--mu2);font-size:22px;line-height:1;padding:2px 6px}
.fg{margin-bottom:14px}
.fl{font-size:11px;color:var(--mu);margin-bottom:5px;display:block;font-weight:600}
.fi,.fsel{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;color:var(--tx);font-size:13px;transition:border-color .15s}
.fi::placeholder{color:var(--mu2)}.fi:focus,.fsel:focus{outline:none;border-color:var(--blue);background:var(--input-focus-bg)}
.fsel option{background:var(--card);color:var(--tx)}
.f-actions{display:flex;gap:8px;margin-top:20px}
.f-cancel{background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:11px 16px;border-radius:10px;font-size:13px;font-weight:500}
.f-save{flex:1;background:var(--tx);color:var(--bg);padding:11px;border-radius:10px;font-size:13px;font-weight:700;transition:opacity .15s}
.f-save:hover{opacity:.8}
.f-del{background:var(--red-d);border:1px solid rgba(255,59,48,.2);color:var(--red);padding:11px 14px;border-radius:10px;font-size:13px}
.empty{text-align:center;padding:48px 20px;color:var(--mu2);font-size:13px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.del-btn{font-size:10px;color:var(--red);border:1px solid rgba(255,59,48,.2);padding:4px 10px;border-radius:6px;background:var(--red-d);transition:all .15s}
.del-btn:hover{background:rgba(255,59,48,.15)}
/* ── PERSON CHIPS ───────────────────────── */
.person-chips{display:flex;flex-wrap:wrap;gap:6px;padding:2px 0}
.pchip{padding:6px 13px;border-radius:20px;border:1px solid var(--bd);background:var(--bg);color:var(--mu);font-size:12px;font-weight:500;transition:all .15s;cursor:pointer}
.pchip.active{border-color:currentColor;font-weight:700}
/* ── OTT/BROADCASTER BADGE ──────────────── */
.ott-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;border:1px solid var(--bd);color:var(--mu);background:var(--bg);white-space:nowrap}
.ott-netflix{background:#e50914;color:#fff;border-color:#e50914}
.ott-disney{background:#113ccf;color:#fff;border-color:#113ccf}
.ott-wavve{background:#004b96;color:#fff;border-color:#004b96}
.ott-tving{background:#ff153c;color:#fff;border-color:#ff153c}
.ott-coupang{background:#c00000;color:#fff;border-color:#c00000}
.ott-apple{background:#1c1c1e;color:#fff;border-color:#1c1c1e}
.ott-youtube{background:#ff0000;color:#fff;border-color:#ff0000}
.ott-theater{background:#6d4c41;color:#fff;border-color:#6d4c41}
.ott-kbs{background:#0064a8;color:#fff;border-color:#0064a8}
.ott-sbs{background:#ffba00;color:#1c1c1e;border-color:#ffba00}
.ott-mbc{background:#0c4ca3;color:#fff;border-color:#0c4ca3}
.ott-tvn{background:#e60000;color:#fff;border-color:#e60000}
.ott-jtbc{background:#e60067;color:#fff;border-color:#e60067}
</style>
</head>
<body>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<!-- ═══ APP ROOT ══════════════════════════════════════ -->
<div id="app-root">
<!-- ═══ HOME ═══════════════════════════════════════ -->
<div class="page active" id="pg-home">
  <div class="home-hero">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="테마 변경">🌙</button>
    <svg class="logo-hero" viewBox="0 0 76 76" xmlns="http://www.w3.org/2000/svg">
      <rect width="76" height="76" rx="18" fill="#ffffff" stroke="#e5e5ea" stroke-width="1"/>
      <polyline points="14,40 14,13 41,13" fill="none" stroke="#1c1c1e" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter"/>
      <polyline points="62,36 62,63 35,63" fill="none" stroke="#1c1c1e" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter"/>
      <polyline points="20,40 20,20 42,20" fill="none" stroke="#8e8e93" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter" opacity="0.5"/>
      <polyline points="56,36 56,56 34,56" fill="none" stroke="#8e8e93" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter" opacity="0.5"/>
      <rect x="11" y="10" width="6" height="6" rx="1" fill="#d1d1d6"/>
      <rect x="38" y="10" width="6" height="6" rx="1" fill="#d1d1d6"/>
      <rect x="59" y="60" width="6" height="6" rx="1" fill="#d1d1d6"/>
      <rect x="32" y="60" width="6" height="6" rx="1" fill="#d1d1d6"/>
      <rect x="25" y="25" width="9" height="9" rx="2" fill="#34c759"/>
      <rect x="33.5" y="33.5" width="9" height="9" rx="2" fill="#ff3b30"/>
      <rect x="42" y="42" width="9" height="9" rx="2" fill="#007aff"/>
    </svg>
    <div class="home-title">MBSU Prod</div>
    <div class="home-sub">Make Beautiful Saturation Universe</div>
  </div>
  <div class="home-nav">
    <div class="nav-grid">
      <div class="nav-card nc-red" onclick="go('schedule')">

}

function toggleChip(btn){
  const isAll = btn.dataset.p === '전체';
  const chips = btn.closest('.person-chips').querySelectorAll('.pchip');
  if(isAll){
    chips.forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
  } else {
    btn.closest('.person-chips').querySelector('[data-p="전체"]').classList.remove('active');
    btn.classList.toggle('active');
    const anyActive = [...chips].some(c => c.classList.contains('active') && c.dataset.p !== '전체');
    if(!anyActive) btn.closest('.person-chips').querySelector('[data-p="전체"]').classList.add('active');
  }
  chips.forEach(c => {
    if(c.classList.contains('active')){
      c.style.color = c.style.getPropertyValue('--pc') || '#8e8e93';
      c.style.borderColor = c.style.getPropertyValue('--pc') || '#8e8e93';
      c.style.background = (c.style.getPropertyValue('--pc') || '#8e8e93') + '18';
    } else {
      c.style.color = ''; c.style.borderColor = ''; c.style.background = '';
    }
  });
}
function getChipPersons(){
  const active = [...document.querySelectorAll('#ev-persons .pchip.active')].map(b => b.dataset.p);
  return active.length ? active : ['전체'];
}
function setChips(persons){
  const arr = Array.isArray(persons) ? persons : [persons || '전체'];
  document.querySelectorAll('#ev-persons .pchip').forEach(c => {
    c.classList.remove('active');
    c.style.color = ''; c.style.borderColor = ''; c.style.background = '';
  });
  arr.forEach(p => {
    const c = document.querySelector(`#ev-persons .pchip[data-p="${p}"]`);
    if(c) toggleChip(c);
  });
}

async function setupListeners(){
  _unsubs.forEach(u => u()); _unsubs = [];
  const evCheck = await db.collection('events').limit(1).get();
  if(evCheck.empty){ await seedData(); }
  _unsubs.push(
    db.collection('events').onSnapshot(snap => {
      events = snap.docs.map(d => ({id: d.id, ...d.data()}));
      if(isActive('schedule')) renderSched();
    })
  );
  _unsubs.push(
    db.collection('equipment').onSnapshot(snap => {
      equip = snap.docs.map(d => ({id: d.id, ...d.data()}));
      if(isActive('equipment')) renderEq();
    })
  );
  _unsubs.push(
    db.collection('exports').onSnapshot(snap => {
      exports_ = snap.docs.map(d => ({id: d.id, ...d.data()}))
        .sort((a,b) => (b.date||'').localeCompare(a.date||''));
      if(isActive('exports')) renderExp();
    })
  );
  _unsubs.push(
    db.collection('filmography').onSnapshot(snap => {
      filmo = {};
      snap.docs.forEach(d => { filmo[d.id] = d.data().films || []; });
      if(isActive('filmography')) renderFilmo();
    })
  );
}
function isActive(page){
  return document.getElementById('pg-'+page)?.classList.contains('active');
}
async function seedData(){
  let batch = db.batch();
  INIT_EV.forEach(e => {
    const {id, ...rest} = e;
    batch.set(db.collection('events').doc(id), rest);
  });
  await batch.commit();
  batch = db.batch();
  INIT_EQ.forEach(e => {
    const {id, ...rest} = e;
    batch.set(db.collection('equipment').doc(id), rest);
  });
  await batch.commit();
}

function filtEvForPerson(){
  if(schedF==='all') return events;
  return events.filter(e => {
    const ps = Array.isArray(e.person) ? e.person : [e.person];
    return ps.includes(schedF) || ps.includes('전체');
  });
}
function renderCal(){
  const MO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-label').textContent=`${calY}년 ${MO[calM]}`;
  const today=new Date();
  const fd=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const pmo=new Date(calY,calM,0).getDate();
  const fe=filtEvForPerson();
  const byD={};
  fe.forEach(e=>{byD[e.date]=(byD[e.date]||[]);byD[e.date].push(e);});
  let h='';
  for(let i=fd-1;i>=0;i--) h+=`<div class="cal-day other-mo"><span class="dn">${pmo-i}</span></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const de=byD[ds]||[];
    const it=today.getFullYear()===calY&&today.getMonth()===calM&&today.getDate()===d;
    const dots=de.slice(0,4).map(e=>{const ps=Array.isArray(e.person)?e.person:[e.person];return`<span class="edot" style="background:${PERSON_COLOR[ps[0]]||'#8e8e93'}"></span>`;}).join('');
    h+=`<div class="cal-day${it?' today':''}${selDate===ds?' sel':''}" onclick="selDay('${ds}',this)"><span class="dn" onclick="event.stopPropagation();selDate='${ds}';openEvModal()" title="탭하여 일정 추가">${d}</span><div class="edots">${dots}</div></div>`;
  }
  const total=Math.ceil((fd+dim)/7)*7;
  for(let d=1;d<=total-fd-dim;d++) h+=`<div class="cal-day other-mo"><span class="dn">${d}</span></div>`;
  document.getElementById('cal-days').innerHTML=h;
}
function chMon(d){
  calM+=d;
  if(calM<0){calM=11;calY--;}
  if(calM>11){calM=0;calY++;}
  selDate = null;
  renderCal();
  renderEvList();
}
function goToToday(){
  const t = new Date();
  calY = t.getFullYear();
  calM = t.getMonth();
  const ds = `${calY}-${String(calM+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  selDate = ds;
  // month 뷰 + 오늘 날짜 선택 시각화
  schedView = 'month';
  document.querySelectorAll('#sched-view-tabs .vtab').forEach(b=>{
    b.classList.toggle('active', b.dataset.view==='month');
  });
  renderCal();
  // 오늘 날짜 일정만 렌더
  const de = filtEvForPerson().filter(e => e.date === ds);
  renderEvList(de, ds);
  toast(`📍 오늘 (${fmtD(ds)})`);
}
function selDay(ds, el){
  document.querySelectorAll('.cal-day').forEach(c=>c.classList.remove('sel'));
  el && el.classList.add('sel');
  selDate = ds;
  const de=filtEvForPerson().filter(e=>e.date===ds);
  renderEvList(de,ds);
}
function renderEvList(items, ds){
  const lbl = document.getElementById('el-label');
  const cnt = document.getElementById('el-count');
  if(!items){
    let pool = filtEvForPerson();
    if(schedView === 'today'){
      const todayStr = new Date().toISOString().slice(0,10);
      items = pool.filter(e => e.date === todayStr).sort((a,b)=>a.date.localeCompare(b.date));
      lbl.textContent = `오늘 일정 · ${fmtD(todayStr)}`;
    } else if(schedView === 'all'){
      items = [...pool].sort((a,b)=> (b.date||'').localeCompare(a.date||''));
      lbl.textContent = '전체 일정';
    } else {
      const ym = `${calY}-${String(calM+1).padStart(2,'0')}`;
      items = pool.filter(e => e.date.startsWith(ym)).sort((a,b)=>a.date.localeCompare(b.date));
      lbl.textContent = `${calY}년 ${calM+1}월 일정`;
    }
  } else {
    lbl.textContent = ds ? fmtD(ds)+' 일정' : '';
  }
  cnt.textContent = `${items.length}건`;
  const c = document.getElementById('sched-evlist');
  c.innerHTML = items.length ? items.map(e=>evHTML(e)).join('') : '<div class="empty">일정이 없습니다</div>';
}
function evHTML(e){
  const sc={완료:'es-done','진행 중':'es-prog','시작 전':'es-todo'};
  const ps=Array.isArray(e.person)?e.person:[e.person||'전체'];
  const isAll=ps.includes('전체');
  const pc=isAll?'#8e8e93':(PERSON_COLOR[ps[0]]||'#8e8e93');
  const personTags=isAll?'':ps.map(p=>`<span style="color:${PERSON_COLOR[p]||'#8e8e93'};font-weight:600">${x(p)}</span>`).join('<span style="color:var(--mu2)"> · </span>');
  return `<div class="ev-item" onclick="openEvModal('${e.id}')">
    <div class="ev-bar" style="background:${pc}"></div>
    <div class="ev-info">
      <div class="ev-name">${x(e.name)}</div>

async function saveEv(){
  const name=document.getElementById('ev-name').value.trim();
  const date=document.getElementById('ev-date').value;
  if(!name||!date){toast('제목과 날짜를 입력해주세요');return;}
  const persons=getChipPersons();
  const d={name,date,person:persons.length===1?persons[0]:persons,
    location:document.getElementById('ev-loc').value.trim(),
    status:document.getElementById('ev-status').value};
  try{
    if(editEvId){ await db.collection('events').doc(editEvId).update(d); }
    else { await db.collection('events').add(d); }
    closeAll(); toast('✅ 저장됐습니다');
  } catch(e){ toast('오류: '+e.message); }
}
async function deleteEv(){
  if(!editEvId||!confirm('삭제하시겠습니까?'))return;

  closeAll(); toast('삭제됐습니다');

// — Equipment modal —
function openEqModal(id){
  editEqId=id||null;
  const e=id?equip.find(v=>v.id===id):null;
  document.getElementById('eq-modal-title').textContent=e?'장비 수정':'장비 추가';
  document.getElementById('eq-name').value=e?.name||'';
  document.getElementById('eq-owner').value=e?.owner||'';
  document.getElementById('eq-company').value=e?.company||'';
  document.getElementById('eq-type').value=e?.types?.[0]||'Camera';
  document.getElementById('eq-qty').value=e?.qty!=null?e.qty:'';
  document.getElementById('eq-notes').value=e?.notes||'';
  document.getElementById('eq-del-btn').style.display=e?'':'none';
  document.getElementById('eq-overlay').classList.add('show');
}
async function saveEq(){
  const name=document.getElementById('eq-name').value.trim();
  if(!name){toast('제품명을 입력해주세요');return;}
  const q=document.getElementById('eq-qty').value;
  const d={name,owner:document.getElementById('eq-owner').value.trim(),
    company:document.getElementById('eq-company').value.trim(),
    types:[document.getElementById('eq-type').value],
    qty:q!==''?Number(q):null,
    notes:document.getElementById('eq-notes').value.trim()};
  try{
    if(editEqId){ await db.collection('equipment').doc(editEqId).update(d); }
    else { await db.collection('equipment').add(d); }
    closeAll(); toast('✅ 저장됐습니다');
  } catch(e){ toast('오류: '+e.message); }
}
async function deleteEq(){
  if(!editEqId||!confirm('삭제하시겠습니까?'))return;
  await db.collection('equipment').doc(editEqId).delete();
  closeAll(); toast('삭제됐습니다');
}
// — Export modal —
function openExpModal(){
  document.getElementById('exp-equip').value='';
  document.getElementById('exp-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('exp-dest').value='';
  document.getElementById('exp-qty').value='';
  document.getElementById('exp-overlay').classList.add('show');
}
async function saveExp(){
  const eq=document.getElementById('exp-equip').value.trim();
  if(!eq){toast('장비명을 입력해주세요');return;}
  await db.collection('exports').add({
    equip:eq,
    date:document.getElementById('exp-date').value,
    dest:document.getElementById('exp-dest').value.trim(),
    qty:document.getElementById('exp-qty').value||null
  });
  closeAll(); toast('✅ 저장됐습니다');
}
async function delExp(id){
  if(!confirm('삭제?'))return;
  await db.collection('exports').doc(id).delete();
}
// — Filmography modal —
function openFilmoModal(id){
  editFilmoId=id||null;
  const list=filmo[filmoP]||[];
  const f=id?list.find(v=>v.id===id):null;
  document.getElementById('filmo-modal-title').textContent=(f?'작품 수정':'작품 추가')+` — ${filmoP}`;
  document.getElementById('filmo-title').value=f?.title||'';
  document.getElementById('filmo-year').value=f?.year||new Date().getFullYear();
  document.getElementById('filmo-type').value=f?.type||'단편영화';
  document.getElementById('filmo-role').value=f?.role||'';
  document.getElementById('filmo-ott').value=f?.ott||'';
  document.getElementById('filmo-notes').value=f?.notes||'';
  document.getElementById('filmo-del-btn').style.display=f?'':'none';
  document.getElementById('filmo-overlay').classList.add('show');
}
async function saveFilmo(){
  const title=document.getElementById('filmo-title').value.trim();
  if(!title){toast('제목을 입력해주세요');return;}
  const d={title,
    year:parseInt(document.getElementById('filmo-year').value)||null,
    type:document.getElementById('filmo-type').value,
    role:document.getElementById('filmo-role').value.trim(),
    ott:document.getElementById('filmo-ott').value||'',
    notes:document.getElementById('filmo-notes').value.trim()};
  const list=[...(filmo[filmoP]||[])];
  if(editFilmoId){
    const i=list.findIndex(f=>f.id===editFilmoId);
    if(i!==-1) list[i]={...list[i],...d};
  } else {
    d.id='f'+Date.now(); list.push(d);
  }
  await db.collection('filmography').doc(filmoP).set({films:list});
  closeAll(); toast('✅ 저장됐습니다');
}
async function deleteFilmo(){
  if(!editFilmoId||!confirm('삭제하시겠습니까?'))return;
  const list=(filmo[filmoP]||[]).filter(f=>f.id!==editFilmoId);
  await db.collection('filmography').doc(filmoP).set({films:list});
  closeAll(); toast('삭제됐습니다');
}

function fmtD(s){if(!s)return'';try{const d=new Date(s+'T00:00:00');return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric',weekday:'short'});}catch{return s;}}
function x(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _tt;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>e.classList.remove('show'),2400);}
